services:
  frontend:
    build: ./frontend
    container_name: moip-frontend
    restart: unless-stopped
    # ホストOSのreboot/shutdownをコンテナ内から実行するために必要。
    # 要件定義書5.3.1・8章。検証用ツールのためセキュリティ考慮は行わない(4.3)。
    pid: host
    privileged: true
    ports:
      - "${WEBGUI_PORT:-80}:8000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/netplan:/etc/netplan
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    # depends_on は設定しない: frontendは logs/ptp4l.log が未生成でも tail -F で待機できるため、
    # 厳密な起動順序は不要(実装計画 7章)。

  ptp:
    build: ./ptp
    container_name: moip-ptp
    restart: unless-stopped
    # PTPはマルチキャスト・ハードウェアタイムスタンプの制約からhostモード必須(要件定義書5.3.1)
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./config:/config
      - ./logs:/var/log/ptp
    environment:
      - TZ=${TZ:-Asia/Tokyo}

