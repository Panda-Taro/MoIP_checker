services:
  frontend:
    build: ./frontend
    container_name: moip-frontend
    restart: unless-stopped
    # ホストOSのreboot/shutdownをコンテナ内から実行するために必要。
    # 要件定義書5.3.1・8章。検証用ツールのためセキュリティ考慮は行わない(4.3)。
    pid: host
    privileged: true
    # ホストの実NIC一覧(ip link show)・IPアドレス・リンク状態を取得するために必要。
    # network_mode: host のためポートマッピング(ports:)は使えず、コンテナが直接
    # ホストのWEBGUI_PORTをlistenする(frontend/Dockerfile参照)。
    network_mode: host
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/netplan:/etc/netplan
      # cloud-initのネットワーク管理を無効化するため(netplan設定との競合対策)
      - /etc/cloud/cloud.cfg.d:/etc/cloud/cloud.cfg.d
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - WEBGUI_PORT=${WEBGUI_PORT:-80}
    # depends_on は設定しない: frontendは logs/ptp4l.log が未生成でも tail -F で待機できるため、
    # 厳密な起動順序は不要(実装計画 7章)。

  ptp:
    build: ./ptp
    container_name: moip-ptp
    restart: unless-stopped
    # PTPはマルチキャスト・ハードウェアタイムスタンプの制約からhostモード必須(要件定義書5.3.1)
    network_mode: host
    # CAP_SYS_TIMEは意図的に付与しない。ptp4lのclock_servoには「調整を行わない」値が
    # 存在しないため(実機でclock_servo null は構文エラーになることを確認済み)、
    # 通常のpiサーボを使いつつ、OS時刻の変更権限自体をカーネルレベルで禁止することで
    # 要件定義書5.3.1(OS時刻に影響を与えない)を実現している。CAP_SYS_TIMEを追加しないこと。
    cap_add:
      - NET_ADMIN
    volumes:
      - ./config:/config
      - ./logs:/var/log/ptp
    environment:
      - TZ=${TZ:-Asia/Tokyo}

